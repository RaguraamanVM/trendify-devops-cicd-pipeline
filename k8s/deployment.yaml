apiVersion: apps/v1
kind: Deployment
metadata:
  name: trend-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: trend-app
  template:
    metadata:
      labels:
        app: trend-app
    spec:
      containers:
      - image: raguraaman/trend-app-proj2:v1
        imagePullPolicy: Always
        name: trend-app
        ports:
        - containerPort: 80
